<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼豆图纸AI生成器 - 廖佳煜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 顶部信息栏 */
        .header {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .student-info {
            display: inline-flex;
            gap: 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 12px 25px;
            border-radius: 50px;
            margin-top: 12px;
        }
        
        .student-info span {
            color: white;
            font-weight: bold;
            font-size: 1em;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 25px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2em;
        }
        
        /* 上传区域 */
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }
        
        .upload-area input {
            display: none;
        }
        
        .upload-icon {
            font-size: 2.5em;
            margin-bottom: 8px;
        }
        
        .upload-text {
            color: #666;
            font-size: 0.9em;
        }
        
        .preview-img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        /* 说明 */
        .info-box {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #666;
        }
        
        .info-box h4 {
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95em;
        }
        
        .info-box ul {
            margin-left: 15px;
            line-height: 1.6;
        }
        
        /* 参数设置 */
        .params {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .param-item {
            text-align: center;
        }
        
        .param-item label {
            display: block;
            color: #666;
            margin-bottom: 6px;
            font-size: 0.85em;
        }
        
        .param-item input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            text-align: center;
        }
        
        .param-item input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 按钮 */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 结果区域 */
        .result-card {
            display: none;
        }
        
        .result-card.active {
            display: block;
        }
        
        .pattern-display {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .pattern-display img {
            max-width: 100%;
            max-height: 800px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        /* 统计信息 */
        .stats-info {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .stat-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8em;
        }
        
        /* 颜色详细统计 */
        .color-stats {
            margin-top: 15px;
        }
        
        .color-stats h3 {
            color: #333;
            margin-bottom: 12px;
            font-size: 1em;
        }
        
        .color-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .color-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f8f9ff;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            border: 1px solid #ddd;
        }
        
        .color-swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #ddd;
            flex-shrink: 0;
        }
        
        /* loading */
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
            
            .student-info {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部信息 -->
        <div class="header">
            <h1>🎨 <span>拼豆图纸AI生成器</span></h1>
            <div class="student-info">
                <span>📚 学号：202535720114</span>
                <span>👤 姓名：廖佳煜</span>
            </div>
        </div>
        
        <div class="main-content">
            <!-- 左侧：上传和参数 -->
            <div class="card">
                <h2>📤 上传图片</h2>
                
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">🖼️</div>
                    <div class="upload-text">点击选择图片<br>（支持任意尺寸，自动适配网格）</div>
                    <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
                    <img id="previewImg" class="preview-img" style="display:none;">
                </div>
                
                <div class="info-box">
                    <h4>📋 图纸格式说明</h4>
                    <ul>
                        <li>白色网格背景 + 浅灰网格线</li>
                        <li>顶部/左侧标注坐标</li>
                        <li>每个格子显示拼豆色号</li>
                        <li>边缘用黑色勾勒</li>
                        <li>底部显示颜色统计</li>
                        <li><b>所有像素都有色号</b></li>
                    </ul>
                </div>
                
                <h2>⚙️ 参数设置（可选）</h2>
                <div class="params">
                    <div class="param-item">
                        <label>宽度</label>
                        <input type="number" id="width" placeholder="原图宽度" min="8" max="128">
                    </div>
                    <div class="param-item">
                        <label>高度</label>
                        <input type="number" id="height" placeholder="原图高度" min="8" max="128">
                    </div>
                </div>
                
                <button class="btn" id="generateBtn" onclick="generatePattern()">
                    🚀 生成拼豆图纸
                </button>
            </div>
            
            <!-- 右侧：结果 -->
            <div class="card result-card" id="resultCard">
                <h2>📋 生成结果</h2>
                
                <div class="stats-info">
                    <span class="stat-badge" id="sizeInfo">尺寸：-</span>
                    <span class="stat-badge" id="beadCount">总格子：0</span>
                    <span class="stat-badge" id="colorCount">使用颜色：0种</span>
                </div>
                
                <div class="pattern-display">
                    <img id="patternImg" src="" alt="拼豆图纸">
                </div>
                
                <div class="color-stats">
                    <h3>🎨 颜色统计（按使用数量排序）</h3>
                    <div class="color-list" id="colorList"></div>
                </div>
            </div>
        </div>
        
        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI正在生成图纸，请稍候...</p>
        </div>
    </div>
    
    <script>
        let selectedFile = null;
        let colorMap = {};
        
        // 加载颜色数据
        async function loadColors() {
            try {
                const response = await fetch('/colors');
                colorMap = await response.json();
            } catch (e) {
                console.error('Failed to load colors:', e);
            }
        }
        loadColors();
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('previewImg');
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }
        
        async function generatePattern() {
            if (!selectedFile) {
                alert('请先选择图片！');
                return;
            }
            
            const widthVal = document.getElementById('width').value;
            const heightVal = document.getElementById('height').value;
            
            const formData = new FormData();
            formData.append('image', selectedFile);
            
            // 只有填写了才传参数
            if (widthVal) formData.append('width', widthVal);
            if (heightVal) formData.append('height', heightVal);
            
            // 显示loading
            document.getElementById('loading').classList.add('active');
            document.getElementById('resultCard').classList.remove('active');
            document.getElementById('generateBtn').disabled = true;
            
            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    alert('生成失败：' + data.error);
                } else {
                    // 显示结果
                    document.getElementById('patternImg').src = 'data:image/png;base64,' + data.pattern_image;
                    document.getElementById('sizeInfo').textContent = `尺寸：${data.width}×${data.height}`;
                    document.getElementById('beadCount').textContent = `总格子：${data.total_beads}`;
                    document.getElementById('colorCount').textContent = `使用颜色：${Object.keys(data.color_counts).length}种`;
                    
                    // 显示颜色详细统计
                    const colorList = document.getElementById('colorList');
                    colorList.innerHTML = '';
                    
                    // 排序
                    const colOrder = {'A': 0, 'B': 1, 'C': 2, 'D': 3, 'E': 4, 'F': 5, 'G': 6, 'H': 7, 'M': 8, 'P': 9, 'Q': 10, 'R': 11, 'T': 12, 'ZG': 13};
                    
                    const sortedColors = Object.entries(data.color_counts)
                        .sort((a, b) => {
                            const colA = a[0].match(/^[A-Z]+/)[0];
                            const colB = b[0].match(/^[A-Z]+/)[0];
                            if (colOrder[colA] !== colOrder[colB]) return colOrder[colA] - colOrder[colB];
                            const numA = parseInt(a[0].slice(colA.length));
                            const numB = parseInt(b[0].slice(colB.length));
                            return numA - numB;
                        });
                    
                    for (const [color, count] of sortedColors) {
                        const hexColor = colorMap[color] || '#FFFFFF';
                        const item = document.createElement('div');
                        item.className = 'color-item';
                        item.innerHTML = `
                            <div class="color-swatch" style="background-color: ${hexColor}"></div>
                            <span><b>${color}</b>(${count})</span>
                        `;
                        colorList.appendChild(item);
                    }
                    
                    document.getElementById('resultCard').classList.add('active');
                }
            } catch (error) {
                alert('请求失败：' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('active');
                document.getElementById('generateBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
